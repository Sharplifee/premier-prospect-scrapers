name: UREstate Session Keepalive

on:
  schedule:
    # Every 30 minutes — session-only maintenance, does NOT trigger scrapers
    - cron: '*/30 * * * *'
  workflow_dispatch:

# This workflow ONLY manages the URE session cookie.
# It does NOT trigger run_all.py or the scraper pipeline.
# Scraper runs once daily via scraper-cron.yml at 4 AM MT.
# Previous issue: cron */10 + contents:write was cascading keepalive
# failures into health-monitor.yml which re-triggered the full scraper
# pipeline — caused 8 full runs on June 16 (79K duplicate signals).

permissions:
  contents: read
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      URE_USERNAME:         ${{ secrets.URE_USERNAME }}
      URE_PASSWORD:         ${{ secrets.URE_PASSWORD }}
      URE_SESSION_COOKIE:   ${{ secrets.URE_SESSION_COOKIE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run auth engine — verify or refresh session
        id: auth
        run: |
          python3 - << 'PYEOF'
          import sys, os, logging
          sys.path.insert(0, 'scrapers')
          logging.basicConfig(level=logging.INFO, format='%(levelname)s %(name)s: %(message)s')

          from ure_auth_engine import get_authenticated_session, _current_cookie, _verify_session

          sess   = get_authenticated_session()
          cookie = _current_cookie

          if cookie and _verify_session(sess, cookie):
              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                  f.write(f'cookie={cookie}\n')
                  f.write(f'status=alive\n')
              print(f'Session LIVE — cookie length {len(cookie)}')
              sys.exit(0)
          else:
              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                  f.write('status=dead\n')
              print('All auth layers failed')
              sys.exit(1)
          PYEOF

      - name: Auto-update URE_SESSION_COOKIE secret
        if: steps.auth.outputs.status == 'alive' && steps.auth.outputs.cookie != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRESH_COOKIE: ${{ steps.auth.outputs.cookie }}
          REPO: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import os, base64, subprocess, requests

          token  = os.environ['GH_TOKEN']
          cookie = os.environ.get('FRESH_COOKIE', '')
          repo   = os.environ['REPO']

          if not cookie:
              print('No cookie — skipping secret update')
              exit(0)

          r = requests.get(
              f'https://api.github.com/repos/{repo}/actions/secrets/public-key',
              headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github.v3+json'}
          )
          pk_data = r.json()
          key_id  = pk_data['key_id']
          pub_key = base64.b64decode(pk_data['key'])

          try:
              import nacl.public
          except ImportError:
              subprocess.run(['pip', 'install', 'PyNaCl', '-q', '--break-system-packages'])
              import nacl.public

          sealed    = nacl.public.SealedBox(nacl.public.PublicKey(pub_key))
          encrypted = base64.b64encode(sealed.encrypt(cookie.encode())).decode()

          r2 = requests.put(
              f'https://api.github.com/repos/{repo}/actions/secrets/URE_SESSION_COOKIE',
              headers={'Authorization': f'token {token}',
                       'Accept': 'application/vnd.github.v3+json',
                       'Content-Type': 'application/json'},
              json={'encrypted_value': encrypted, 'key_id': key_id}
          )
          print(f'Secret update: {r2.status_code}')
          PYEOF

      - name: Alert Supabase on total failure
        if: failure()
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/system_alerts" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"alert_type\":\"ure_session_keepalive_failed\",\"severity\":\"critical\",\"message\":\"UREstate keepalive workflow failed — all auth layers exhausted\",\"metadata\":{\"run\":\"${{ github.run_number }}\"}}"
