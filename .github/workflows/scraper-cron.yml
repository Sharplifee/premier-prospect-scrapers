name: Premier Prospect Scrapers

on:
  workflow_dispatch:
  schedule:
    # 4:00 AM Mountain Time daily
    # MDT (Mar-Nov): 10:00 UTC | MST (Nov-Mar): 11:00 UTC
    # Both listed — daily-skip logic in scraper prevents double-runs on transition days
    - cron: '0 10 * * *'  # 4:00 AM MDT (summer)
    - cron: '0 11 * * *'  # 4:00 AM MST (winter)

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      ACCELA_CLIENT_ID: ${{ secrets.ACCELA_CLIENT_ID }}
      ACCELA_CLIENT_SECRET: ${{ secrets.ACCELA_CLIENT_SECRET }}
      MLS_BEARER_TOKEN: ${{ secrets.MLS_BEARER_TOKEN }}
      TRACERFY_API_KEY: ${{ secrets.TRACERFY_API_KEY }}
      VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
      DNC_SAN: ${{ secrets.DNC_SAN }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pdfplumber httpx

      - name: Run scrapers
        id: scrapers
        run: python scrapers/run_all.py

      - name: Keepalive commit (prevents GitHub cron pause)
        if: always()
        run: |
          git config user.name "Premier Prospect Bot"
          git config user.email "bot@premierprospect.co"
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') run #${{ github.run_number }}" >> .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "keepalive: run #${{ github.run_number }} [skip ci]"
          git push

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_SID }}/Messages.json" \
            --user "${{ secrets.TWILIO_SID }}:${{ secrets.TWILIO_TOKEN }}" \
            --data-urlencode "From=${{ secrets.TWILIO_FROM }}" \
            --data-urlencode "To=${{ secrets.ALERT_TO }}" \
            --data-urlencode "Body=⚠️ Premier Prospect: scraper run #${{ github.run_number }} failed. Check https://github.com/Sharplifee/premier-prospect-scrapers/actions"
