name: Premier Prospect Scrapers

on:
  workflow_dispatch:
    inputs:
      force_rerun:
        description: 'Bypass already-ran-today guards (verification testing)'
        required: false
        default: 'false'
  schedule:
    # 4:00 AM Mountain Time daily
    # MDT (Mar-Nov): 10:00 UTC | MST (Nov-Mar): 11:00 UTC
    # Both listed — daily-skip logic in scraper prevents double-runs on transition days
    - cron: '0 10 * * *'  # 4:00 AM MDT (summer)
    - cron: '0 11 * * *'  # 4:00 AM MST (winter)

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_PROXY_PASSWORD: ${{ secrets.APIFY_PROXY_PASSWORD }}
      FORCE_RERUN: ${{ github.event.inputs.force_rerun || 'false' }}
      ACCELA_CLIENT_ID: ${{ secrets.ACCELA_CLIENT_ID }}
      ACCELA_CLIENT_SECRET: ${{ secrets.ACCELA_CLIENT_SECRET }}
      MLS_BEARER_TOKEN: ${{ secrets.MLS_BEARER_TOKEN }}
      URE_USERNAME: ${{ secrets.URE_USERNAME }}
      URE_PASSWORD: ${{ secrets.URE_PASSWORD }}
      URE_SESSION_COOKIE: ${{ secrets.URE_SESSION_COOKIE }}
      TRACERFY_API_KEY: ${{ secrets.TRACERFY_API_KEY }}
      VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
      DNC_SAN: ${{ secrets.DNC_SAN }}
      TWILIO_SID: ${{ secrets.TWILIO_SID }}
      TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
      TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
      ALERT_TO: ${{ secrets.ALERT_TO }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pdfplumber httpx

      - name: DIAG - full post_batch flow reproduction
        run: |
          python3 -c "
          import os, requests, hashlib, time
          KEY = os.environ['SUPABASE_SERVICE_KEY']
          URL = os.environ['SUPABASE_URL']
          TABLE = URL + '/rest/v1/pp_scraper_signals'
          H = {'Authorization':'Bearer '+KEY,'Content-Type':'application/json','apikey':KEY,'Prefer':'return=minimal,resolution=ignore-duplicates'}
          S = requests.Session(); S.headers['User-Agent']='Mozilla/5.0'
          slug='__diag_flow__'
          ts=str(int(time.time()))
          rows=[{'source_slug':slug,'signal_type':'diag','score':1,'county':'Utah','raw_owner_name':'DIAG '+ts+' '+str(n),'raw_address':'ADDR '+ts+' '+str(n),'dedupe_hash':hashlib.md5((ts+str(n)).encode()).hexdigest()} for n in range(3)]
          # before count
          br = S.get(TABLE+'?select=id&source_slug=eq.'+slug+'&limit=1', headers={**H,'Prefer':'count=exact'}, timeout=15)
          print('BEFORE_STATUS=',br.status_code,'CONTENT_RANGE=',repr(br.headers.get('content-range')))
          before=int(br.headers.get('content-range','0/0').split('/')[-1])
          print('BEFORE_COUNT=',before)
          # insert
          ir = S.post(TABLE, json=rows, headers=H, timeout=45)
          print('INSERT_STATUS=',ir.status_code,'BODY=',repr(ir.text[:150]))
          # after count
          ar = S.get(TABLE+'?select=id&source_slug=eq.'+slug+'&limit=1', headers={**H,'Prefer':'count=exact'}, timeout=15)
          print('AFTER_STATUS=',ar.status_code,'CONTENT_RANGE=',repr(ar.headers.get('content-range')))
          after=int(ar.headers.get('content-range','0/0').split('/')[-1])
          print('AFTER_COUNT=',after)
          print('COMPUTED_INSERTED=',max(0,after-before))
          # authoritative check
          chk=S.get(TABLE+'?select=dedupe_hash&source_slug=eq.'+slug, headers={**H,'Prefer':'count=exact'}, timeout=15)
          print('ROWS_ACTUALLY_PRESENT=',len(chk.json()))
          # cleanup
          S.delete(TABLE+'?source_slug=eq.'+slug, headers=H, timeout=15)
          print('CLEANED_UP')
          "

      - name: Run scrapers
        id: scrapers
        run: python scrapers/run_all.py

      - name: Keepalive commit (prevents GitHub cron pause)
        if: always()
        run: |
          git config user.name "Premier Prospect Bot"
          git config user.email "bot@premierprospect.co"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') run #${{ github.run_number }}" >> .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "keepalive: run #${{ github.run_number }} [skip ci]"
          git push origin main

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_SID }}/Messages.json" \
            --user "${{ secrets.TWILIO_SID }}:${{ secrets.TWILIO_TOKEN }}" \
            --data-urlencode "From=${{ secrets.TWILIO_FROM }}" \
            --data-urlencode "To=${{ secrets.ALERT_TO }}" \
            --data-urlencode "Body=⚠️ Premier Prospect: scraper run #${{ github.run_number }} failed. Check https://github.com/Sharplifee/premier-prospect-scrapers/actions"
